<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vincenzo Olivieri — Comico, Autore, Speaker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Anton&family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
      #splash {
        position: fixed;
        inset: 0;
        background: #050505;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0;
        transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1),
                    visibility 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        overflow: hidden;
      }
      #splash.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* Animated noise — same as app */
      #splash::before {
        content: '';
        position: absolute;
        inset: 0;
        opacity: 0.03;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        pointer-events: none;
      }

      /* Yellow glow blob */
      #splash::after {
        content: '';
        position: absolute;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(255,215,0,0.08) 0%, transparent 70%);
        border-radius: 50%;
        animation: splash-pulse 2s ease-in-out infinite;
        pointer-events: none;
      }
      @keyframes splash-pulse {
        0%, 100% { transform: scale(1); opacity: 0.6; }
        50%       { transform: scale(1.15); opacity: 1; }
      }

      /* Wordmark */
      .splash-wordmark {
        font-family: 'Bebas Neue', sans-serif;
        font-size: clamp(3rem, 10vw, 7rem);
        letter-spacing: 0.04em;
        line-height: 1;
        text-transform: uppercase;
        color: #fff;
        position: relative;
        z-index: 1;
        animation: splash-in 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
      .splash-wordmark em {
        font-style: normal;
        color: #FFD700;
        -webkit-text-stroke: 0px;
      }
      @keyframes splash-in {
        from { opacity: 0; transform: translateY(20px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* Tagline */
      .splash-tagline {
        font-family: 'Inter', sans-serif;
        font-size: clamp(0.55rem, 1.5vw, 0.7rem);
        font-weight: 700;
        letter-spacing: 0.35em;
        text-transform: uppercase;
        color: rgba(255,255,255,0.3);
        margin-top: 12px;
        position: relative;
        z-index: 1;
        animation: splash-in 0.7s 0.15s cubic-bezier(0.16, 1, 0.3, 1) both;
      }

      /* Progress line */
      .splash-line {
        position: absolute;
        bottom: 0;
        left: 0;
        height: 2px;
        width: 0;
        background: linear-gradient(90deg, transparent, #FFD700 40%, #FFD700);
        animation: splash-progress 1s 0.1s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
      @keyframes splash-progress {
        to { width: 100%; }
      }

      /* Star decoration */
      .splash-star {
        font-family: 'Bebas Neue', sans-serif;
        font-size: clamp(0.55rem, 1.2vw, 0.65rem);
        letter-spacing: 0.4em;
        color: rgba(255,215,0,0.5);
        margin-top: 28px;
        position: relative;
        z-index: 1;
        animation: splash-in 0.7s 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <p class="splash-wordmark">Vincenzo<br><em>Olivieri</em></p>
      <p class="splash-tagline">Comico · Autore · Speaker</p>
      <p class="splash-star">★ Roba da matti tour 2025 ★</p>
      <div class="splash-line"></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
